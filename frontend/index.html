    async function refreshDashboard() {
      state.clustersLoaded = false;
      state.allRecommendations = [];
      state.allCandidates = [];
      await Promise.all([
        loadHealth(true),
        connectVcenter(false),
        loadClusters(true)
      ]);
      await Promise.all([loadAllRecommendations(true), loadAllCandidates(true)]);
    }

    async function ensureDataForCurrentRoute() {
      const route = state.route;

      await loadHealth();

      if (route.name === "dashboard") {
        await Promise.all([loadClusters(), loadAllRecommendations(), loadAllCandidates()]);
        return;
      }

      if (route.name === "clusters") {
        await loadClusters();
        warmClusterDetailsForTable();
        return;
      }

      if (route.name === "cluster") {
        await loadClusters();
        await Promise.all([
          loadClusterDetail(route.clusterId),
          loadClusterRecommendations(route.clusterId),
          loadClusterCandidates(route.clusterId),
          loadClusterSimulation(route.clusterId)
        ]);
        return;
      }

      if (route.name === "datastore") {
        await loadClusters();
        await loadClusterDetail(route.clusterId);
        const ds = findDatastoreById(route.clusterId, route.datastoreId);
        await openDatastoreVms(route.clusterId, route.datastoreId, ds?.name || route.datastoreId);
        return;
      }

      if (route.name === "recommendations") {
        await Promise.all([loadAllRecommendations(), loadAllCandidates()]);
        return;
      }

      if (route.name === "vcenter") {
        await loadVcenterConfig();
        return;
      }

      if (route.name === "settings") {
        return;
      }
    }

    async function onRouteChange() {
      state.route = parseRoute();
      state.sidebarOpen = false;
      render();
      await ensureDataForCurrentRoute();
    }

    document.addEventListener("click", async (event) => {
      const trigger = event.target.closest("[data-action]");
      if (!trigger) return;

      const action = trigger.dataset.action;

      if (action === "toggle-sidebar") {
        state.sidebarOpen = !state.sidebarOpen;
        render();
        return;
      }

      if (action === "toggle-theme") {
        state.theme = state.theme === "dark" ? "light" : "dark";
        render();
        return;
      }

      if (action === "test-connection") {
        await Promise.all([loadHealth(true), connectVcenter(true)]);
        return;
      }

      if (action === "refresh-dashboard") {
        await refreshDashboard();
        return;
      }

      if (action === "refresh-clusters") {
        state.clustersLoaded = false;
        await loadClusters(true);
        await warmClusterDetailsForTable();
        return;
      }

      if (action === "refresh-recommendations") {
        state.allRecommendations = [];
        state.allCandidates = [];
        await Promise.all([loadAllRecommendations(true), loadAllCandidates(true)]);
        return;
      }

      if (action === "refresh-cluster") {
        const clusterId = trigger.dataset.clusterId;
        if (!clusterId) return;
        delete state.clusterDetails[clusterId];
        delete state.clusterRecs[clusterId];
        delete state.clusterCandidates[clusterId];
        delete state.clusterSimulation[clusterId];
        if (state.selectedDatastore.clusterId === clusterId && state.selectedDatastore.datastoreId) {
          delete state.datastoreVms[datastoreKey(clusterId, state.selectedDatastore.datastoreId)];
          state.movePreview = null;
          state.moveConfirm.open = false;
          state.moveForm = {
            clusterId,
            sourceDatastoreId: state.selectedDatastore.datastoreId,
            vmId: "",
            targetDatastoreId: ""
          };
        }
        await Promise.all([
          loadClusterDetail(clusterId, true),
          loadClusterRecommendations(clusterId, true),
          loadClusterCandidates(clusterId, true),
          loadClusterSimulation(clusterId, true)
        ]);
        if (state.route.name === "datastore" && state.route.clusterId === clusterId && state.route.datastoreId) {
          const ds = findDatastoreById(clusterId, state.route.datastoreId);
          await openDatastoreVms(clusterId, state.route.datastoreId, ds?.name || state.route.datastoreId);
        }
        return;
      }

      if (action === "refresh-cluster-simulation") {
        const clusterId = trigger.dataset.clusterId;
        if (!clusterId) return;
        delete state.clusterSimulation[clusterId];
        await loadClusterSimulation(clusterId, true);
        return;
      }

      if (action === "view-cluster") {
        const clusterId = trigger.dataset.clusterId;
        if (!clusterId) return;
        setHash(`#cluster/${encodeURIComponent(clusterId)}`);
        return;
      }

      if (action === "open-datastore-vms") {
        const clusterId = trigger.dataset.clusterId;
        const datastoreId = trigger.dataset.datastoreId;
        const datastoreName = trigger.dataset.datastoreName || datastoreId;
        if (!clusterId || !datastoreId) return;
        await openDatastoreVms(clusterId, datastoreId, datastoreName);
        return;
      }

      if (action === "view-datastore-page") {
        const clusterId = trigger.dataset.clusterId;
        const datastoreId = trigger.dataset.datastoreId;
        if (!clusterId || !datastoreId) return;
        setHash(`#cluster/${encodeURIComponent(clusterId)}/datastore/${encodeURIComponent(datastoreId)}`);
        return;
      }

      if (action === "open-apply-modal") {
        openApplyModal(
          trigger.dataset.clusterId,
          trigger.dataset.key,
          trigger.dataset.title || "Confirm apply"
        );
        return;
      }

      if (action === "close-move-confirm-modal") {
        closeMoveConfirmModal();
        return;
      }

      if (action === "confirm-vm-move") {
        const payload = state.moveConfirm;
        if (!payload.clusterId || !payload.vmId || !payload.targetDatastoreId) return;
        await moveVmToDatastore(
          payload.clusterId,
          payload.vmId,
          payload.sourceDatastoreId,
          payload.targetDatastoreId
        );
        return;
      }

      if (action === "close-modal") {
        closeModal();
        return;
      }

      if (action === "confirm-apply") {
        if (!state.modal.clusterId || !state.modal.key) return;
        await applyRecommendation(state.modal.clusterId, state.modal.key);
        return;
      }

      if (action === "dismiss-recommendation") {
        const clusterId = trigger.dataset.clusterId;
        const key = trigger.dataset.key;
        if (!clusterId || !key) return;
        await dismissRecommendation(clusterId, key);
        return;
      }
    });

    document.addEventListener("change", async (event) => {
      const form = event.target.closest("form");
      if (!form || form.id !== "move-vm-form") return;

      const formData = new FormData(form);
      const clusterId = String(formData.get("clusterId") || "").trim();
      const sourceDatastoreId = String(formData.get("sourceDatastoreId") || "").trim();
      const vmId = String(formData.get("vmId") || "").trim();
      let targetDatastoreId = String(formData.get("targetDatastoreId") || "").trim();

      if (event.target.name === "vmId") {
        targetDatastoreId = "";
      }

      state.moveForm = {
        clusterId,
        sourceDatastoreId,
        vmId,
        targetDatastoreId
      };

      if (event.target.name === "vmId") {
        state.movePreview = null;
        state.moveConfirm.open = false;
        if (vmId) {
          await loadMoveOptions(clusterId, sourceDatastoreId, vmId, true);
        }
      }

      if (state.moveForm.vmId && state.moveForm.targetDatastoreId) {
        state.movePreview = buildMovePreview(
          state.moveForm.clusterId,
          state.moveForm.sourceDatastoreId,
          state.moveForm.targetDatastoreId,
          state.moveForm.vmId
        );
      } else if (event.target.name === "targetDatastoreId") {
        state.movePreview = null;
      }

      render();
    });

    document.addEventListener("submit", async (event) => {
      const form = event.target;
      if (!(form.id === "settings-form" || form.id === "vcenter-form" || form.id === "move-vm-form")) return;

      event.preventDefault();

      if (form.id === "settings-form") {
        const formData = new FormData(form);
        const apiBase = String(formData.get("apiBase") || "").trim();

        if (!apiBase) {
          showToast("Informe a URL base do backend.", "error");
          return;
        }

        state.apiBase = apiBase.replace(/\/+$/, "");
        state.health = null;
        state.backendReachable = false;
        state.connected = false;
        state.connectionError = "";
        state.clusters = [];
        state.clustersLoaded = false;
        state.clusterDetails = {};
        state.clusterRecs = {};
        state.clusterCandidates = {};
        state.clusterSimulation = {};
        state.datastoreVms = {};
        state.allRecommendations = [];
        state.allCandidates = [];
        state.selectedDatastore = { clusterId: "", datastoreId: "", datastoreName: "" };
        state.moveForm = { clusterId: "", sourceDatastoreId: "", vmId: "", targetDatastoreId: "" };
        state.moveOptionsByVm = {};
        state.movePreview = null;
        state.moveConfirm.open = false;
        stopMoveTaskPolling();
        state.moveTask = { taskId: "", state: "", progress: null, error: "", active: false };
        showToast("URL do backend atualizada só nesta sessão.", "success");
        render();

        await Promise.all([loadHealth(true), connectVcenter(false)]);
        return;
      }

      if (form.id === "vcenter-form") {
        const formData = new FormData(form);
        state.vcenterForm.host = String(formData.get("host") || "").trim();
        state.vcenterForm.user = String(formData.get("user") || "").trim();
        state.vcenterForm.password = String(formData.get("password") || "");
        state.vcenterForm.verify_ssl = formData.get("verify_ssl") === "on";

        await saveVcenterConfig(true);
        await connectVcenter(true);
        return;
      }

      if (form.id === "move-vm-form") {
        const formData = new FormData(form);
        const clusterId = String(formData.get("clusterId") || "").trim();
        const sourceDatastoreId = String(formData.get("sourceDatastoreId") || "").trim();
        const vmId = String(formData.get("vmId") || "").trim();
        const targetDatastoreId = String(formData.get("targetDatastoreId") || "").trim();

        state.moveForm = {
          clusterId,
          sourceDatastoreId,
          vmId,
          targetDatastoreId
        };
        state.movePreview = buildMovePreview(clusterId, sourceDatastoreId, targetDatastoreId, vmId);
        openMoveConfirmModal();
      }
    });

    window.addEventListener("hashchange", onRouteChange);

    async function init() {
      state.route = parseRoute();
      render();
      await Promise.all([loadHealth(true), loadVcenterConfig(true)]);
      await connectVcenter(false);
      await ensureDataForCurrentRoute();
    }

    init();
  </script>
</body>
</html>
